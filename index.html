<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F1F2EE">
<title>DailyLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Karla:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F1F2EE;
    --surface:#FFFFFF;
    --surface-2:#FAFBF8;
    --ink:#22312B;
    --ink-soft:#5E6D66;
    --ink-faint:#93A09A;
    --line:#E1E5DD;
    --amber:#D99A2B;     --amber-soft:#F6ECD6;  --amber-ink:#8A5E0F;
    --teal:#2E8C80;      --teal-soft:#DEEEEB;   --teal-ink:#1E635A;
    --coral:#D96A45;     --coral-soft:#F8E5DC;  --coral-ink:#A0431F;
    --danger:#C24A3A;
    --radius:20px;
    --header-h:120px;
    --display:'Bricolage Grotesque',sans-serif;
    --body:'Karla',sans-serif;
    --mono:'Spline Sans Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    overscroll-behavior-y:none;
  }
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:8px}

  .shell{max-width:520px;margin:0 auto;height:100dvh;display:flex;flex-direction:column}

  /* ───── header + pager ───── */
  header.top{
    padding:calc(env(safe-area-inset-top) + 18px) 20px 12px;
    display:flex;flex-direction:column;gap:14px;
  }
  .brand{
    font-family:var(--display);font-weight:700;font-size:1.05rem;letter-spacing:.01em;
    display:flex;align-items:baseline;gap:8px;
  }
  .brand .day-tag{
    font-family:var(--mono);font-weight:500;font-size:.72rem;color:var(--ink-faint);
    text-transform:lowercase;letter-spacing:.02em;
  }
  nav.pager{display:flex;gap:8px}
  .pill{
    height:38px;border-radius:999px;display:flex;align-items:center;gap:8px;
    padding:0 13px;background:var(--surface);border:1px solid var(--line);
    color:var(--ink-soft);font-weight:600;font-size:.85rem;white-space:nowrap;
    transition:background .35s ease,color .35s ease,border-color .35s ease,flex-grow .35s ease;
    overflow:hidden;flex:0 1 auto;
  }
  .pill .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .pill[data-i="0"] .dot{background:var(--amber)}
  .pill[data-i="1"] .dot{background:var(--teal)}
  .pill[data-i="2"] .dot{background:var(--coral)}
  .pill .label{opacity:.9}
  .pill.active{flex-grow:1;border-color:transparent;color:#fff}
  .pill.active[data-i="0"]{background:var(--amber)}
  .pill.active[data-i="1"]{background:var(--teal)}
  .pill.active[data-i="2"]{background:var(--coral)}
  .pill.active .dot{background:rgba(255,255,255,.85)}

  /* ───── swipe panes ───── */
  main.panes{
    flex:1;display:flex;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;scrollbar-width:none;
  }
  main.panes::-webkit-scrollbar{display:none}
  section.pane{
    flex:0 0 100%;scroll-snap-align:start;scroll-snap-stop:always;
    overflow-y:auto;padding:6px 20px calc(env(safe-area-inset-bottom) + 96px);
  }

  /* ───── shared bits ───── */
  .eyebrow{
    font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin:22px 0 10px;
  }
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  }
  .hour-chip{
    font-family:var(--mono);font-weight:600;font-size:.82rem;
    padding:4px 9px;border-radius:9px;flex:none;
  }
  .empty{
    text-align:center;padding:42px 24px;color:var(--ink-soft);font-size:.95rem;
  }
  .empty .big{font-size:2rem;display:block;margin-bottom:10px}

  /* ───── dashboard ───── */
  .greet{font-family:var(--display);font-weight:700;font-size:2rem;line-height:1.05;margin-top:14px}
  .greet-sub{color:var(--ink-soft);margin-top:6px;font-size:.95rem}
  .progress-card{margin-top:18px;padding:18px;display:flex;flex-direction:column;gap:10px}
  .progress-row{display:flex;justify-content:space-between;align-items:baseline}
  .progress-num{font-family:var(--display);font-weight:700;font-size:1.4rem}
  .progress-cap{font-size:.85rem;color:var(--ink-soft)}
  .bar{height:8px;border-radius:99px;background:var(--bg);overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;background:var(--amber);width:0;transition:width .6s cubic-bezier(.2,.8,.2,1)}

  .timeline{display:flex;flex-direction:column}
  .t-item{
    display:flex;align-items:center;gap:14px;padding:13px 4px;
    border-bottom:1px dashed var(--line);
  }
  .t-item:last-child{border-bottom:none}
  .t-hour{
    font-family:var(--mono);font-weight:600;font-size:.85rem;width:52px;flex:none;
    color:var(--ink-soft);
  }
  .t-hour.dog{font-size:1rem}
  .t-label{flex:1;font-weight:600;font-size:.97rem}
  .t-note{font-size:.78rem;color:var(--ink-faint);margin-top:1px;font-weight:400}
  .t-flag{
    font-family:var(--mono);font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:8px;
    background:var(--amber-soft);color:var(--amber-ink);flex:none;
  }
  .t-kind{width:8px;height:8px;border-radius:50%;flex:none}
  .t-kind.med{background:var(--teal)}
  .t-kind.dog{background:var(--coral)}
  .alldone{
    margin-top:18px;padding:36px 24px;text-align:center;
    background:linear-gradient(160deg,var(--amber-soft),var(--surface));
    border:1px solid var(--line);border-radius:var(--radius);
  }
  .alldone .ring{
    width:64px;height:64px;border-radius:50%;background:var(--amber);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  }
  .alldone .ring svg{width:30px;height:30px;stroke:#fff}
  .alldone h3{font-family:var(--display);font-weight:700;font-size:1.25rem}
  .alldone p{color:var(--ink-soft);font-size:.9rem;margin-top:4px}

  /* ───── remédios ───── */
  .pane-title{
    display:flex;align-items:center;justify-content:space-between;margin-top:14px;
  }
  .pane-title h2{font-family:var(--display);font-weight:700;font-size:1.6rem}
  .btn-add{
    height:40px;padding:0 16px;border-radius:999px;font-weight:700;font-size:.88rem;
    display:flex;align-items:center;gap:6px;color:#fff;background:var(--teal);
    transition:transform .15s ease;
  }
  .btn-add:active{transform:scale(.96)}
  .med-card{
    display:flex;align-items:center;gap:14px;padding:14px;margin-bottom:10px;
    transition:opacity .3s ease;
  }
  .med-card.taken{opacity:.62}
  .check{
    width:48px;height:48px;border-radius:16px;flex:none;
    border:2px solid var(--line);background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;
    transition:background .25s ease,border-color .25s ease,transform .12s ease;
  }
  .check:active{transform:scale(.92)}
  .check svg{width:22px;height:22px;stroke:transparent;transition:stroke .2s ease}
  .med-card.taken .check{background:var(--teal);border-color:var(--teal)}
  .med-card.taken .check svg{stroke:#fff}
  .med-info{flex:1;min-width:0}
  .med-name{font-weight:700;font-size:1rem}
  .med-card.taken .med-name{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--teal)}
  .med-desc{font-size:.8rem;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .med-taken-at{font-family:var(--mono);font-size:.7rem;color:var(--teal-ink);margin-top:3px}
  .med-card .hour-chip{background:var(--teal-soft);color:var(--teal-ink)}
  .kebab{
    width:36px;height:36px;border-radius:12px;flex:none;color:var(--ink-faint);
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  }
  .kebab:hover{background:var(--bg)}

  /* ───── dogs ───── */
  .dog-card{
    display:flex;align-items:center;gap:14px;padding:16px;margin-bottom:10px;
    transition:background .3s ease,border-color .3s ease;
  }
  .dog-card .icon{
    width:48px;height:48px;border-radius:16px;flex:none;background:var(--coral-soft);
    display:flex;align-items:center;justify-content:center;font-size:1.35rem;
  }
  .dog-q{flex:1;font-weight:700;font-size:1rem}
  .dog-state{font-size:.78rem;color:var(--ink-faint);font-weight:500;margin-top:2px}
  .toggle{
    width:62px;height:36px;border-radius:99px;flex:none;position:relative;
    background:var(--line);transition:background .25s ease;
  }
  .toggle::after{
    content:"";position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:50%;
    background:#fff;box-shadow:0 1px 4px rgba(20,30,25,.25);transition:transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .dog-card.done{background:var(--coral-soft);border-color:transparent}
  .dog-card.done .toggle{background:var(--coral)}
  .dog-card.done .toggle::after{transform:translateX(26px)}
  .dog-card.done .dog-state{color:var(--coral-ink)}

  /* ───── bottom sheet ───── */
  .backdrop{
    position:fixed;inset:0;background:rgba(28,40,34,.4);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:40;
  }
  .backdrop.open{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:520px;z-index:50;
    background:var(--surface);border-radius:26px 26px 0 0;
    padding:14px 22px calc(env(safe-area-inset-bottom) + 22px);
    transform:translateY(105%);transition:transform .32s cubic-bezier(.2,.8,.2,1);
  }
  .sheet.open{transform:translateY(0)}
  .sheet .grip{width:42px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 16px}
  .sheet h3{font-family:var(--display);font-weight:700;font-size:1.3rem;margin-bottom:16px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em}
  .field input{
    width:100%;height:50px;border-radius:14px;border:1.5px solid var(--line);
    background:var(--surface-2);padding:0 14px;font-family:var(--body);font-size:1rem;color:var(--ink);
  }
  .field input[type=time]{font-family:var(--mono);font-weight:600}
  .field input:focus{border-color:var(--teal);outline:none}
  .sheet-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .btn-primary{
    height:52px;border-radius:16px;background:var(--teal);color:#fff;font-weight:700;font-size:1rem;
    transition:transform .15s ease;
  }
  .btn-primary:active{transform:scale(.98)}
  .btn-ghost{height:44px;border-radius:14px;font-weight:600;color:var(--ink-soft)}
  .btn-danger{height:44px;border-radius:14px;font-weight:700;color:var(--danger)}

  /* ───── toast ───── */
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);
    transform:translate(-50%,80px);z-index:60;
    background:var(--ink);color:#fff;font-weight:600;font-size:.88rem;
    padding:12px 20px;border-radius:14px;transition:transform .3s cubic-bezier(.2,.8,.2,1);
    max-width:88vw;text-align:center;
  }
  .toast.show{transform:translate(-50%,0)}

  /* ───── setup notice ───── */
  .setup{
    margin-top:30px;padding:24px;border-radius:var(--radius);
    background:var(--surface);border:1.5px dashed var(--amber);
  }
  .setup h3{font-family:var(--display);font-size:1.15rem;margin-bottom:8px}
  .setup p{font-size:.9rem;color:var(--ink-soft);line-height:1.5}
  .setup code{font-family:var(--mono);font-size:.8rem;background:var(--bg);padding:2px 6px;border-radius:6px}

  .skeleton{height:78px;border-radius:var(--radius);margin-bottom:10px;
    background:linear-gradient(100deg,var(--surface) 40%,var(--surface-2) 50%,var(--surface) 60%);
    background-size:200% 100%;animation:sk 1.2s infinite linear}
  @keyframes sk{to{background-position:-200% 0}}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="brand">DailyLife <span class="day-tag" id="dayTag"></span></div>
    <nav class="pager" aria-label="Abas">
      <button class="pill active" data-i="0" onclick="goTo(0)"><span class="dot"></span><span class="label">Hoje</span></button>
      <button class="pill" data-i="1" onclick="goTo(1)"><span class="dot"></span><span class="label">Remédios</span></button>
      <button class="pill" data-i="2" onclick="goTo(2)"><span class="dot"></span><span class="label">Dogs</span></button>
    </nav>
  </header>

  <main class="panes" id="panes">

    <!-- ── ABA 1 · HOJE ── -->
    <section class="pane" id="pane-dash">
      <h1 class="greet" id="greet">Olá.</h1>
      <p class="greet-sub" id="greetSub"></p>
      <div id="dashBody">
        <div class="skeleton" style="margin-top:18px"></div>
        <div class="skeleton"></div>
      </div>
    </section>

    <!-- ── ABA 2 · REMÉDIOS ── -->
    <section class="pane" id="pane-meds">
      <div class="pane-title">
        <h2>Remédios</h2>
        <button class="btn-add" onclick="openSheet()">+ Novo</button>
      </div>
      <div id="medsBody">
        <div class="skeleton" style="margin-top:18px"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

    <!-- ── ABA 3 · DOGS ── -->
    <section class="pane" id="pane-dogs">
      <div class="pane-title"><h2>Dogs</h2></div>
      <p class="greet-sub" style="margin-top:4px">A rotina deles, todo dia.</p>
      <div id="dogsBody" style="margin-top:18px">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

  </main>
</div>

<!-- bottom sheet: cadastro/edição de remédio -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="grip"></div>
  <h3 id="sheetTitle">Novo remédio</h3>
  <div class="field">
    <label for="fName">Nome</label>
    <input id="fName" type="text" placeholder="Ex.: Euthyrox" autocomplete="off">
  </div>
  <div class="field">
    <label for="fDesc">Descrição <span style="font-weight:400">(opcional)</span></label>
    <input id="fDesc" type="text" placeholder="Ex.: tomar em jejum" autocomplete="off">
  </div>
  <div class="field">
    <label for="fTime">Horário</label>
    <input id="fTime" type="time">
  </div>
  <div class="sheet-actions">
    <button class="btn-primary" id="btnSave" onclick="saveMed()">Salvar</button>
    <button class="btn-danger" id="btnDelete" onclick="deleteMed()" style="display:none">Excluir remédio</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════ CONFIG ════════ */
const SUPABASE_URL = 'https://asnuusgwtsjpwuaakfuc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Z46thUwaqpXRR8i2PxZWzQ_oG2eJ3yK';

const DOG_TASKS = [
  { key:'walk',   icon:'🐾', label:'Eles passearam?' },
  { key:'ozzy',   icon:'💊', label:'Ozzy tomou remédio?' },
  { key:'lunch',  icon:'🍖', label:'Eles almoçaram?' },
  { key:'dinner', icon:'🌙', label:'Eles jantaram?' },
];

const configured = !SUPABASE_URL.includes('COLE_AQUI');
const sb = configured ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

let meds = [], medLogs = [], dogLogs = [];

/* ════════ helpers ════════ */
const $ = id => document.getElementById(id);
const todayISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmtHour = t => {
  const [h,m] = (t||'00:00').split(':');
  return m === '00' ? `${h}h` : `${h}:${m}`;
};
const nowHHMM = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let toastTimer;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

/* ════════ header ════════ */
function paintHeader(){
  const d = new Date();
  const wd = d.toLocaleDateString('pt-BR',{weekday:'long'});
  const dm = d.toLocaleDateString('pt-BR',{day:'numeric',month:'long'});
  $('dayTag').textContent = `· ${wd.split('-')[0]}, ${dm}`;
  const h = d.getHours();
  $('greet').textContent = h < 12 ? 'Bom dia.' : h < 18 ? 'Boa tarde.' : 'Boa noite.';
}

/* ════════ swipe / pager ════════ */
const panes = $('panes');
function goTo(i){
  panes.scrollTo({ left: i * panes.clientWidth, behavior:'smooth' });
}
let scrollT;
panes.addEventListener('scroll', () => {
  clearTimeout(scrollT);
  scrollT = setTimeout(() => {
    const i = Math.round(panes.scrollLeft / panes.clientWidth);
    document.querySelectorAll('.pill').forEach(p =>
      p.classList.toggle('active', +p.dataset.i === i));
  }, 60);
});

/* ════════ data ════════ */
async function loadAll(){
  if (!configured){ renderSetup(); return; }
  try{
    const day = todayISO();
    const [m, ml, dl] = await Promise.all([
      sb.from('dl_medicines').select('*').order('med_time').order('name'),
      sb.from('dl_med_logs').select('*').eq('taken_on', day),
      sb.from('dl_dog_logs').select('*').eq('done_on', day),
    ]);
    if (m.error || ml.error || dl.error) throw (m.error || ml.error || dl.error);
    meds = m.data; medLogs = ml.data; dogLogs = dl.data;
    renderAll();
  }catch(e){
    console.error(e);
    toast('Não consegui falar com o banco. Verifica a conexão?');
  }
}

const medLog  = id  => medLogs.find(l => l.medicine_id === id);
const dogDone = key => dogLogs.some(l => l.task_key === key);

/* ════════ render ════════ */
function renderAll(){ renderDash(); renderMeds(); renderDogs(); }

function renderDash(){
  const total = meds.length + DOG_TASKS.length;
  const done  = medLogs.length + dogLogs.filter(l => DOG_TASKS.some(t => t.key === l.task_key)).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  $('greetSub').textContent = total === 0 ? 'Nada cadastrado ainda.' :
    done === total ? 'Dia completo — pode relaxar.' :
    `${total - done} ${total - done === 1 ? 'coisa pendente' : 'coisas pendentes'} hoje.`;

  const now = nowHHMM();
  const pendingMeds = meds.filter(m => !medLog(m.id))
    .map(m => ({ hour: m.med_time.slice(0,5), label: m.name, note: m.description, kind:'med',
                 late: m.med_time.slice(0,5) < now }))
    .sort((a,b) => a.hour.localeCompare(b.hour));
  const pendingDogs = DOG_TASKS.filter(t => !dogDone(t.key))
    .map(t => ({ hour:t.icon, label:t.label, kind:'dog', late:false }));

  let html = `
    <div class="card progress-card">
      <div class="progress-row">
        <span class="progress-num">${done} de ${total}</span>
        <span class="progress-cap">${pct}% do dia</span>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`;

  const pending = [...pendingMeds, ...pendingDogs];
  if (total > 0 && pending.length === 0){
    html += `
      <div class="alldone">
        <div class="ring"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
        <h3>Tudo feito por hoje</h3>
        <p>Remédios tomados, dogs cuidados. Bom descanso.</p>
      </div>`;
  } else if (pending.length){
    html += `<p class="eyebrow">Falta fazer</p><div class="card" style="padding:4px 16px"><div class="timeline">`;
    for (const p of pending){
      html += `
        <div class="t-item">
          <span class="t-hour ${p.kind}">${p.kind === 'med' ? fmtHour(p.hour) : p.hour}</span>
          <span class="t-kind ${p.kind}"></span>
          <span class="t-label">${esc(p.label)}${p.note ? `<div class="t-note">${esc(p.note)}</div>` : ''}</span>
          ${p.late ? '<span class="t-flag">passou da hora</span>' : ''}
        </div>`;
    }
    html += `</div></div>`;
  }
  $('dashBody').innerHTML = html;
}

function renderMeds(){
  if (!meds.length){
    $('medsBody').innerHTML = `<div class="empty"><span class="big">💊</span>Nenhum remédio cadastrado.<br>Toca em “+ Novo” pra começar.</div>`;
    return;
  }
  let html = '';
  let lastPeriod = '';
  for (const m of meds){
    const h = +m.med_time.slice(0,2);
    const period = h < 12 ? 'Manhã' : h < 18 ? 'Tarde' : 'Noite';
    if (period !== lastPeriod){
      html += `<p class="eyebrow">${period}</p>`;
      lastPeriod = period;
    }
    const log = medLog(m.id);
    const takenAt = log ? new Date(log.taken_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : null;
    html += `
      <div class="card med-card ${log ? 'taken' : ''}">
        <button class="check" aria-label="${log ? 'Desmarcar' : 'Marcar como tomado'}" onclick="toggleMed('${m.id}')">${CHECK_SVG}</button>
        <div class="med-info">
          <div class="med-name">${esc(m.name)}</div>
          ${m.description ? `<div class="med-desc">${esc(m.description)}</div>` : ''}
          ${takenAt ? `<div class="med-taken-at">tomei às ${takenAt}</div>` : ''}
        </div>
        <span class="hour-chip">${fmtHour(m.med_time.slice(0,5))}</span>
        <button class="kebab" aria-label="Editar ${esc(m.name)}" onclick="openSheet('${m.id}')">⋯</button>
      </div>`;
  }
  $('medsBody').innerHTML = html;
}

function renderDogs(){
  let html = '';
  for (const t of DOG_TASKS){
    const done = dogDone(t.key);
    html += `
      <div class="card dog-card ${done ? 'done' : ''}">
        <div class="icon">${t.icon}</div>
        <div>
          <div class="dog-q">${t.label}</div>
          <div class="dog-state">${done ? 'Sim ✓' : 'Ainda não'}</div>
        </div>
        <span style="flex:1"></span>
        <button class="toggle" role="switch" aria-checked="${done}" aria-label="${t.label}" onclick="toggleDog('${t.key}')"></button>
      </div>`;
  }
  $('dogsBody').innerHTML = html;
}

function renderSetup(){
  const msg = `
    <div class="setup">
      <h3>Quase lá ⚙️</h3>
      <p>Abre o <code>index.html</code> e cola sua <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no topo do <code>&lt;script&gt;</code>. Depois roda o SQL de setup no Supabase.</p>
    </div>`;
  $('dashBody').innerHTML = msg;
  $('medsBody').innerHTML = msg;
  $('dogsBody').innerHTML = msg;
}

/* ════════ ações ════════ */
async function toggleMed(id){
  const log = medLog(id);
  try{
    if (log){
      const { error } = await sb.from('dl_med_logs').delete().eq('id', log.id);
      if (error) throw error;
      medLogs = medLogs.filter(l => l.id !== log.id);
      toast('Desfeito.');
    }else{
      const { data, error } = await sb.from('dl_med_logs')
        .insert({ medicine_id:id, taken_on: todayISO() }).select().single();
      if (error) throw error;
      medLogs.push(data);
    }
    renderAll();
  }catch(e){ console.error(e); toast('Não deu pra salvar. Tenta de novo?'); }
}

async function toggleDog(key){
  const log = dogLogs.find(l => l.task_key === key);
  try{
    if (log){
      const { error } = await sb.from('dl_dog_logs').delete().eq('id', log.id);
      if (error) throw error;
      dogLogs = dogLogs.filter(l => l.id !== log.id);
    }else{
      const { data, error } = await sb.from('dl_dog_logs')
        .insert({ task_key:key, done_on: todayISO() }).select().single();
      if (error) throw error;
      dogLogs.push(data);
    }
    renderAll();
  }catch(e){ console.error(e); toast('Não deu pra salvar. Tenta de novo?'); }
}

/* ════════ sheet (CRUD) ════════ */
let editingId = null;
function openSheet(id){
  editingId = id || null;
  const m = id ? meds.find(x => x.id === id) : null;
  $('sheetTitle').textContent = m ? 'Editar remédio' : 'Novo remédio';
  $('fName').value = m ? m.name : '';
  $('fDesc').value = m ? (m.description || '') : '';
  $('fTime').value = m ? m.med_time.slice(0,5) : '';
  $('btnDelete').style.display = m ? 'block' : 'none';
  $('backdrop').classList.add('open');
  $('sheet').classList.add('open');
  if (!m) setTimeout(() => $('fName').focus(), 320);
}
function closeSheet(){
  $('backdrop').classList.remove('open');
  $('sheet').classList.remove('open');
}
async function saveMed(){
  const name = $('fName').value.trim();
  const description = $('fDesc').value.trim() || null;
  const med_time = $('fTime').value;
  if (!name){ toast('Dá um nome pro remédio.'); return; }
  if (!med_time){ toast('Escolhe o horário.'); return; }
  $('btnSave').disabled = true;
  try{
    if (editingId){
      const { error } = await sb.from('dl_medicines')
        .update({ name, description, med_time }).eq('id', editingId);
      if (error) throw error;
      toast('Remédio atualizado.');
    }else{
      const { error } = await sb.from('dl_medicines')
        .insert({ name, description, med_time });
      if (error) throw error;
      toast('Remédio cadastrado.');
    }
    closeSheet();
    await loadAll();
  }catch(e){ console.error(e); toast('Não deu pra salvar. Tenta de novo?'); }
  finally{ $('btnSave').disabled = false; }
}
async function deleteMed(){
  if (!editingId) return;
  const m = meds.find(x => x.id === editingId);
  if (!confirm(`Excluir ${m ? m.name : 'este remédio'}? O histórico dele some junto.`)) return;
  try{
    const { error } = await sb.from('dl_medicines').delete().eq('id', editingId);
    if (error) throw error;
    toast('Remédio excluído.');
    closeSheet();
    await loadAll();
  }catch(e){ console.error(e); toast('Não deu pra excluir. Tenta de novo?'); }
}

/* ════════ boot ════════ */
paintHeader();
loadAll();
/* se o app ficar aberto e virar o dia / mudar a hora, atualiza */
setInterval(() => { paintHeader(); if (configured) renderDash(); }, 60_000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadAll();
});
</script>
</body>
</html>
